name: CI

on:
  push:
    branches: [master]
    tags: ["v*", "cli-v*", "lib-v*"]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      BINARY_NAME: snapcat
      ARTIFACT_NAME: snapcat-${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup default stable

      - name: Build release binary
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Smoke test binary
        run: |
          output=$("./target/release/$BINARY_NAME" --help)
          if [ -z "$output" ]; then
            echo "ERROR: Failed to run snapcat --help"
            exit 1
          fi
          echo "Binary output:"
          echo "$output"

      - name: Package binary
        run: |
          mkdir -p upload
          cp "./target/release/$BINARY_NAME" upload/
          tar -czf "$ARTIFACT_NAME.tar.gz" -C upload "$BINARY_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.tar.gz
